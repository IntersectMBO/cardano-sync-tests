# Self-hosted NixOS: labels self-hosted, Linux, X64, nixos.
# BLOCKFROST_API_KEY is only injected when environment is mainnet (epoch metadata during sync).

name: Node sync tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "pytest --environment (Blockfrost secret used only for mainnet)"
        type: choice
        options:
          - mainnet
          - preprod
          - preview
        default: mainnet
      node_revision:
        description: >-
          pytest --node-revision: tag/branch, or "latest" for newest IntersectMBO/cardano-node release.
        type: string
        default: "latest"

permissions:
  contents: read
  actions: write

jobs:
  node_sync_pytest_self_hosted:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - nixos
    timeout-minutes: 14400
    env:
      PYTHONUNBUFFERED: "1"
      BLOCKFROST_API_KEY: ${{ inputs.environment == 'mainnet' && secrets.BLOCKFROST_API_KEY || '' }}
      SYNC_TESTS_HEARTBEAT_INTERVAL_SEC: "600"
      SYNC_TESTS_HEARTBEAT_TAIL_LINES: "30"
      SYNC_TESTS_FAILURE_TAIL_LINES: "300"
      PYTEST_ADDOPTS: "--log-cli-level=WARNING"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve cardano-node revision
        id: rev
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          raw="${{ inputs.node_revision }}"
          raw="${raw#"${raw%%[![:space:]]*}"}"
          raw="${raw%"${raw##*[![:space:]]}"}"
          if [ -z "$raw" ] || [ "${raw,,}" = "latest" ]; then
            rel="https://api.github.com/repos/IntersectMBO/cardano-node/releases/latest"
            resolved="$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "$rel" | jq -r .tag_name)"
            echo "Resolved latest cardano-node release: ${resolved}"
          else
            resolved="$raw"
            echo "Using workflow input: ${resolved}"
          fi
          safe="${resolved//[^A-Za-z0-9._-]/-}"
          echo "node_revision=${resolved}" >> "${GITHUB_OUTPUT}"
          echo "artifact_slug=${safe}" >> "${GITHUB_OUTPUT}"

      - name: Run node sync pytest
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p test_workdir
          : > test_workdir/nix_build.log

          bash sync_tests/scripts/heartbeat.sh node-only &
          HB_PID=$!
          trap 'pkill -P "$HB_PID" 2>/dev/null || true; kill "$HB_PID" 2>/dev/null || true' EXIT

          pytest_exit=0
          {
            echo "=== ci step started $(date -u +%FT%TZ) ==="
            nix develop -v --accept-flake-config .#python --command \
              pytest sync_tests/tests/test_nodesync_artifacts.py \
              --environment "${{ inputs.environment }}" \
              --node-revision "${{ steps.rev.outputs.node_revision }}"
          } > test_workdir/ci_step.log 2>&1 || pytest_exit=$?

          bash sync_tests/scripts/print-ci-summary.sh test_workdir/ci_step.log
          exit "$pytest_exit"

      - name: Recent log tails on failure
        if: failure()
        shell: bash
        run: |
          set +e
          echo "::group::Recent log tails"
          for log in test_workdir/ci_step.log test_workdir/nix_build.log test_workdir/node_sync.log; do
            if [ -f "$log" ]; then
              echo "--- $log (last ${SYNC_TESTS_FAILURE_TAIL_LINES:-300}) ---"
              tail -n "${SYNC_TESTS_FAILURE_TAIL_LINES:-300}" "$log"
            else
              echo "[$log not present]"
            fi
          done
          echo "::endgroup::"

      - name: Upload CI bundles
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: sync-ci-bundles-${{ runner.name }}-${{ inputs.environment }}-${{ steps.rev.outputs.artifact_slug }}
          path: |
            sync_logs.zip
            sync_results.zip
            monitor.zip
          if-no-files-found: warn

      - name: Cleanup test workdir
        if: always()
        run: rm -rf test_workdir
